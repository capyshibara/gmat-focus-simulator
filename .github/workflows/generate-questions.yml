name: Generate new questions

on:
  # Daily cron paused -- trigger manually from the Actions tab when new questions are wanted.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate questions
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/generate-questions.mjs
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/quant.json src/data/cr.json src/data/di.json
          if git diff --cached --quiet; then
            echo "No new questions generated, nothing to commit."
          else
            git commit -m "Auto-generate new practice questions"
            git push
          fi
